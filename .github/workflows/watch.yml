name: Naver Reservation Watch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Check reservation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AVAILABLE_TEXT: ${{ secrets.AVAILABLE_TEXT }}
          UNAVAILABLE_TEXT: ${{ secrets.UNAVAILABLE_TEXT }}
          ENTRY_TEXT: ${{ secrets.ENTRY_TEXT }}
          SLOT_SELECTOR: ${{ secrets.SLOT_SELECTOR }}
          DETECT_MODE: ${{ secrets.DETECT_MODE }}
          CLICK_SELECTOR: ${{ secrets.CLICK_SELECTOR }}
        run: |
          python naver_reservation_watch.py "${{ secrets.RESERVATION_URL }}" \
            --headless \
            --once \
            --no-sound
